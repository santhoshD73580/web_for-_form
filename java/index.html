<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link href="main.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0d0d0d;
      --paper:  #f5f0e8;
      --accent: #c0392b;
      --muted:  #888;
      --border: #d4cfc5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── decorative lines ── */
    body::before, body::after {
      content: '';
      position: fixed;
      background: var(--border);
    }
    body::before { top: 0; left: 60px; width: 1px; height: 100vh; }
    body::after  { top: 0; right: 60px; width: 1px; height: 100vh; }

    /* ── hero ── */
    .hero {
      text-align: center;
      animation: fadeUp .8s ease both;
    }
    .hero-label {
      font-size: .7rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1.05;
      margin-bottom: 1.6rem;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: .95rem;
      color: var(--muted);
      max-width: 320px;
      margin: 0 auto 2.4rem;
      line-height: 1.7;
    }

    /* ── login button ── */
    .btn-login {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: .85rem 2.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .05em;
      cursor: pointer;
      transition: background .25s, transform .15s;
    }
    .btn-login:hover { background: var(--accent); transform: translateY(-2px); }
    .btn-login svg { transition: transform .25s; }
    .btn-login:hover svg { transform: translateX(4px); }

    /* ── overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,13,.55);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 100;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* ── modal ── */
    .modal {
      background: var(--paper);
      width: min(480px, 92vw);
      padding: 2.8rem 3rem;
      position: relative;
      transform: translateY(30px) scale(.97);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      border-top: 3px solid var(--accent);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-close {
      position: absolute; top: 1.1rem; right: 1.2rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.4rem; line-height: 1;
    }
    .modal-close:hover { color: var(--accent); }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      margin-bottom: .35rem;
    }
    .modal-sub {
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* ── form ── */
    .field { margin-bottom: 1.4rem; }
    .field label {
      display: block;
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }
    .field input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      background: transparent;
      padding: .5rem 0;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-bottom-color: var(--accent); }
    .field input::placeholder { color: #bbb; }

    .btn-submit {
      width: 100%;
      margin-top: .6rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: .9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .06em;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-submit:hover { background: #a93226; transform: translateY(-1px); }

    /* ── toast ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: var(--paper);
      padding: .8rem 1.8rem;
      font-size: .85rem; letter-spacing: .04em;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <p class="hero-label">Welcome</p>
    <h1>Join Our<br/><span>Community</span></h1>
    <p>Create your profile in seconds and unlock everything we have to offer.</p>
    <button class="btn-login" onclick="openModal()">
      Register Now
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </section>

  <!-- Overlay + Modal -->
  <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&#x2715;</button>
      <h2 id="modal-title">Create Account</h2>
      <p class="modal-sub">Fill in your details below</p>

      <form id="registerForm" onsubmit="submitForm(event)">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required/>
        </div>
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required/>
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210"
                 pattern="[0-9+\-\s()]{7,15}" required/>
        </div>
        <button type="submit" class="btn-submit">Submit Registration</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const overlay = document.getElementById('overlay');
    const toast   = document.getElementById('toast');

    function openModal()  { overlay.classList.add('open'); }
    function closeModal() { overlay.classList.remove('open'); }

    function handleOverlayClick(e) {
      if (e.target === overlay) closeModal();
    }

    function showToast(msg, duration = 3000) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    async function submitForm(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        name:  form.name.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim()
      };

      try {
        const res = await fetch('./RegisterServlet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          closeModal();
          form.reset();
          showToast('✓ Registration successful!');
        } else {
          showToast('✗ Server error. Please try again.');
        }
      } catch {
        showToast('✗ Could not reach server.');
      }
    }
  </script>
</body>
</html>
